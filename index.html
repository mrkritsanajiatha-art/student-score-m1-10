<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ค้นหานักเรียน | ระบบเก็บคะแนน</title>

  <!-- ฟอนต์ไทย -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

<body>
  <div id="nav"></div>

  <div class="container-app">
    <h2 class="page-title">🔍 ค้นหาคะแนนนักเรียน</h2>

    <!-- กล่องค้นหา -->
    <div class="glass">
      <div class="input-group input-group-lg">
        <input type="text" id="searchInput" class="form-control" placeholder="พิมพ์ชื่อ เลขที่ หรือรหัสนักเรียน..." autocomplete="off" />
        <button class="btn btn-grad px-4" onclick="doSearch()">ค้นหา</button>

      <div id="searchResults" class="mt-3"></div>
    </div>

    <!-- ผลลัพธ์รายละเอียดนักเรียน -->
    <div id="studentDetail" class="mt-3"></div>
  </div>

  <!-- ไลบรารี -->

  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@04f46c6/qrcode.min.js"></script>

  <script src="js/common.js"></script>
