<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ค้นหาคะแนนนักเรียน | ม.1/10</title>

  <!-- ฟอนต์ Prompt (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 (ใช้ utility class ที่ JS สร้าง เช่น d-flex, row, table) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav"></div>

  <main class="container-app">
    <!-- Hero -->
    <section class="hero">
      <div class="hero-icon" aria-hidden="true">🔍</div>
      <h1 class="page-title">ค้นหาคะแนนของคุณ</h1>
      <p class="page-subtitle">พิมพ์ เลขที่ / รหัสนักเรียน / ชื่อ หรือ นามสกุล แล้วกดค้นหาได้เลย</p>

      <div class="course-info">
        <span class="course-code">อ21205</span>
        <span class="course-name">ภาษาอังกฤษรอบรู้</span>
        <span class="course-dot" aria-hidden="true">·</span>
        <span class="course-teacher">👨‍🏫 ครูกฤษณะ เจี๊ยะทา</span>
      </div>
    </section>

    <!-- กล่องค้นหา -->
    <div class="glass search-card">
      <div class="search-wrapper">
        <div class="search-field">
          <span class="search-field-icon" aria-hidden="true">🔍</span>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="พิมพ์ชื่อ รหัส หรือเลขที่..."
            autocomplete="off"
            aria-label="ค้นหานักเรียน"
          />
        </div>
        <button class="btn-grad btn-search" type="button" onclick="doSearch()">ค้นหา</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <!-- รายชื่อนักเรียน (กดเลือกได้เลย ไม่ต้องค้นหา) -->
    <div class="glass roster-card">
      <h2 class="section-title">👥 รายชื่อนักเรียน</h2>
      <p class="section-hint">แตะชื่อของตัวเองในกรอบ เพื่อดูคะแนนได้เลย</p>
      <div id="studentRoster" class="roster-grid"></div>
    </div>

    <!-- ผลลัพธ์รายละเอียดนักเรียน -->
    <div id="studentDetail" class="mt-3"></div>
  </main>

  <footer class="site-footer">
    © 2025 ระบบเก็บคะแนน ม.1/10 · พัฒนาด้วย ❤️
  </footer>

  <!-- ไลบรารี -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@04f46c6/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/student-card.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
