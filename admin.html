<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แอดมิน | ระบบเก็บคะแนน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav"></div>
  <div class="container-app">

    <!-- ============ หน้าเข้าสู่ระบบ (Login) ============ -->
    <div id="loginView">
      <h2 class="page-title">🔐 เข้าสู่ระบบแอดมิน</h2>
      <div class="glass" style="max-width:420px;margin:0 auto">
        <div class="mb-3">
          <label class="form-label fw-bold">ชื่อผู้ใช้</label>
          <input type="text" id="username" class="form-control form-control-lg" autocomplete="username" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">รหัสผ่าน</label>
          <input type="password" id="password" class="form-control form-control-lg" autocomplete="current-password" />
        </div>
        <button class="btn btn-grad w-100 btn-lg" onclick="doLogin()">เข้าสู่ระบบ</button>
      </div>
    </div>

    <!-- ============ พื้นที่แอดมิน (หลัง Login) ============ -->
    <div id="adminView" style="display:none">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h2 class="page-title mb-0">🛠️ แผงควบคุมแอดมิน</h2>
        <button class="btn-soft no-print" onclick="logout()">🚪 ออกจากระบบ</button>
      </div>

      <!-- แท็บ -->
      <ul class="nav nav-pills justify-content-center my-3 no-print" id="adminTabs">
        <li class="nav-item"><button class="nav-link active" data-tab="dashboard">📊 แดชบอร์ด</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="scanner">📷 สแกน QR</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="random">🎯 สุ่มนักเรียน</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="reports">📄 รายงาน</button></li>
      </ul>

      <!-- ===== แท็บ: แดชบอร์ด ===== -->
      <div class="tab-pane" data-pane="dashboard">
        <div class="stat-grid mb-3" id="statCards"></div>
        <div class="row g-3">
          <div class="col-lg-6"><div class="glass"><h6 class="fw-bold mb-3">การกระจายคะแนน</h6><canvas id="chartDist"></canvas></div></div>
          <div class="col-lg-6"><div class="glass"><h6 class="fw-bold mb-3">🏅 5 อันดับสูงสุด / ต่ำสุด</h6><canvas id="chartTop"></canvas></div></div>
        </div>
        <div class="glass mt-3">
          <h6 class="fw-bold mb-3">🕓 กิจกรรมล่าสุด</h6>
          <div id="recentActivity"><div class="spinner-center"><div class="spinner-border text-primary"></div></div></div>
        </div>
      </div>

      <!-- ===== แท็บ: สแกน QR ===== -->
      <div class="tab-pane" data-pane="scanner" style="display:none">
        <div class="glass scanner-wrap">
          <h6 class="fw-bold mb-3 text-center">📷 สแกน QR Code นักเรียน</h6>
          <div id="reader"></div>
          <div class="d-flex gap-2 mt-3 justify-content-center">
            <button class="btn-grad" id="btnStartScan" onclick="startScanner()">▶️ เริ่มสแกน</button>
            <button class="btn-soft" id="btnStopScan" onclick="stopScanner()" style="display:none">⏹️ หยุด</button>
          </div>
          <div class="divider"></div>
          <p class="text-soft text-center mb-2">หรือค้นหาด้วยตนเอง</p>
          <div class="input-group">
            <input type="text" id="manualId" class="form-control" placeholder="พิมพ์รหัสนักเรียน เช่น 29601" />
            <button class="btn btn-grad" onclick="manualLookup()">ค้นหา</button>
          </div>
        </div>
      </div>

      <!-- ===== แท็บ: สุ่มนักเรียน ===== -->
      <div class="tab-pane" data-pane="random" style="display:none">
        <div class="glass" style="max-width:520px;margin:0 auto">
          <h6 class="fw-bold mb-3 text-center">🎯 สุ่มเรียกนักเรียนตอบคำถาม</h6>
          <div id="wheel" class="wheel-display">กดปุ่มเพื่อสุ่ม</div>
          <button class="btn btn-grad w-100 btn-lg mt-3" id="btnRandom" onclick="spinRandom()">🎲 สุ่มนักเรียน</button>
        </div>
      </div>

      <!-- ===== แท็บ: รายงาน ===== -->
      <div class="tab-pane" data-pane="reports" style="display:none">
        <div class="glass">
          <h6 class="fw-bold mb-3">📄 ออกรายงาน</h6>
          <div class="d-flex flex-wrap gap-2 mb-3 no-print">
            <button class="btn-soft" onclick="exportExcel()">📊 Export Excel</button>
            <button class="btn-soft" onclick="exportPdf()">📕 Export PDF</button>
            <button class="btn-soft" onclick="window.print()">🖨️ พิมพ์</button>
            <button class="btn-soft" onclick="loadReports()">🔄 รีเฟรช</button>
          </div>
          <div id="reportTable"><div class="spinner-center"><div class="spinner-border text-primary"></div></div></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ไลบรารี -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
