<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>อันดับคะแนน | ระบบเก็บคะแนน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav"></div>
  <div class="container-app">
    <h2 class="page-title">🏆 อันดับคะแนนนักเรียน</h2>

    <div class="glass">
      <div class="row g-2 align-items-center mb-3">
        <div class="col-sm">
          <input type="text" id="lbSearch" class="form-control" placeholder="🔍 ค้นหาชื่อ / รหัส / เลขที่..." />
        </div>
        <div class="col-sm-auto">
          <select id="lbSort" class="form-select">
            <option value="rank">เรียงตามอันดับ</option>
            <option value="scoreAsc">คะแนนน้อย → มาก</option>
            <option value="no">เรียงตามเลขที่</option>
          </select>
        </div>
      </div>
      <div id="lbList">
        <div class="spinner-center"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/leaderboard.js"></script>
</body>
</html>
